<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - Skill Nexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #020817;
      --cyan: #00d4ff;
      --purple: #a855f7;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
    }

    html { scroll-behavior: smooth; }
    
    body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1, h2, h3, h4, h5, h6, .logo-text {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--cyan), var(--purple));
      border-radius: 3px;
    }

    /* Glass */
    .glass {
      background: var(--glass);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    /* Glow */
    .glow-cyan {
      box-shadow: 0 0 20px rgba(0,212,255,0.3), 0 0 40px rgba(0,212,255,0.1);
    }

    .grad-text {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Background animation */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .blob-cyan { background: var(--cyan); }
    .blob-purple { background: var(--purple); }

    /* Main container */
    .login-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Background blobs */
    .blob-1 {
      width: 500px;
      height: 500px;
      top: -100px;
      left: -100px;
    }
    .blob-2 {
      width: 400px;
      height: 400px;
      bottom: -50px;
      right: -50px;
    }

    /* Login box */
    .login-box {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 450px;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #94a3b8;
      font-size: 14px;
    }

    /* Form */
    .login-form {
      background: var(--glass);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
      background: rgba(0,212,255,0.05);
    }

    .form-group input::placeholder {
      color: #475569;
    }

    /* Remember me */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .remember-me input {
      width: auto;
      accent-color: var(--cyan);
    }

    .forgot-password {
      color: var(--cyan);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-password:hover {
      color: var(--purple);
    }

    /* Buttons */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,212,255,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .btn-login .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    .btn-login.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Signup link */
    .auth-switch {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .auth-switch a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-switch a:hover {
      color: var(--purple);
    }

    /* Social login */
    .social-login {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .social-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .social-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,212,255,0.05);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(168,85,247,0.2));
      border: 1px solid rgba(0,212,255,0.4);
      backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 14px 24px;
      color: #e2e8f0;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: rgba(34,197,94,0.4);
      background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.1));
    }

    .toast.error {
      border-color: rgba(248,113,113,0.4);
      background: linear-gradient(135deg, rgba(248,113,113,0.2), rgba(248,113,113,0.1));
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-form {
        padding: 24px;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }

      .blob-1, .blob-2 {
        display: none;
      }
    }

    /* Error message */
    .error-message {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-left: 3px solid #f87171;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Success message */
    .success-message {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-left: 3px solid #22c55e;
      color: #86efac;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1 blob-cyan" style="position: absolute; top: -100px; left: -100px;"></div>
  <div class="blob blob-2 blob-purple" style="position: absolute; bottom: -50px; right: -50px;"></div>

  <!-- Main container -->
  <div class="login-container">
    <!-- Login box -->
    <div class="login-box">
      <!-- Header -->
      <div class="login-header">
        <a href="skill-nexus-app.html" class="logo">
          <div class="logo-icon">🧠</div>
          <div class="logo-text">Skill Nexus</div>
        </a>
        <h1>مرحباً بك</h1>
        <p>اكتشف مساراتك المهنية مع الذكاء الاصطناعي</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <!-- Error message -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" placeholder="your@email.com" required />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <!-- Form options -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>تذكرني</span>
          </label>
          <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">هل نسيت كلمة المرور؟</a>
        </div>

        <!-- Login button -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="spinner"></span>
          دخول
        </button>

        <!-- Sign up link -->
        <div class="auth-switch">
          ليس لديك حساب؟ <a href="#" onclick="handleSignUp(event)">إنشاء حساب جديد</a>
        </div>

        <!-- Social login -->
        <div style="text-align: center; margin: 24px 0; color: #64748b; font-size: 13px;">أو</div>
        <div class="social-login">
          <button type="button" class="social-btn" onclick="handleGoogleLogin()">
            <span>🔵</span> Google
          </button>
          <button type="button" class="social-btn" onclick="handleGithubLogin()">
            <span>⬛</span> GitHub
          </button>
        </div>
      </form>

      <!-- Footer -->
      <div style="text-align: center; font-size: 12px; color: #475569;">
        <p>بتسجيل دخولك، توافق على <a href="#" style="color: var(--cyan); text-decoration: none;">شروط الخدمة</a> و <a href="#" style="color: var(--cyan); text-decoration: none;">سياسة الخصوصية</a></p>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script>
    /**
     * ═══════════════════════════════════════════════════════════════════════════
     * LOGIN PAGE FUNCTIONALITY
     * ═══════════════════════════════════════════════════════════════════════════
     */

    // Mock user database
    const mockUsers = [
      {
        id: 1,
        name: 'عمر محمد',
        email: 'omar@skillnexus.com',
        password: 'password123',
        role: 'student',
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Omar'
      },
      {
        id: 2,
        name: 'سارة علي',
        email: 'sara@skillnexus.com',
        password: 'password123',
        role: 'mentor',
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Sara'
      }
    ];

    /**
     * Show toast notification
     */
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    /**
     * Show error message
     */
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = '❌ ' + message;
      errorEl.classList.add('show');
    }

    /**
     * Clear error message
     */
    function clearError() {
      const errorEl = document.getElementById('errorMessage');
      errorEl.classList.remove('show');
    }

    /**
     * Show success message
     */
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage');
      successEl.textContent = '✅ ' + message;
      successEl.classList.add('show');
    }

    /**
     * Clear success message
     */
    function clearSuccess() {
      const successEl = document.getElementById('successMessage');
      successEl.classList.remove('show');
    }

    /**
     * Handle login
     */
    function handleLogin(e) {
      e.preventDefault();
      clearError();
      clearSuccess();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const rememberMe = document.getElementById('rememberMe').checked;
      const btn = document.getElementById('loginBtn');

      // Validation
      if (!email || !password) {
        showError('يرجى ملء جميع الحقول');
        return;
      }

      if (!email.includes('@')) {
        showError('يرجى إدخال بريد إلكتروني صحيح');
        return;
      }

      // Show loading state
      btn.classList.add('loading');

      // Simulate API call
      setTimeout(() => {
        // Find user
        const user = mockUsers.find(u => u.email === email && u.password === password);

        if (!user) {
          btn.classList.remove('loading');
          showError('بريد إلكتروني أو كلمة مرور غير صحيحة');
          return;
        }

        // Save to localStorage
        localStorage.setItem('currentUser', JSON.stringify(user));
        localStorage.setItem('skillTestCompleted', 'true');
        if (rememberMe) {
          localStorage.setItem('rememberEmail', email);
        }

        // Show success
        showSuccess('تم تسجيل الدخول بنجاح!');
        btn.classList.remove('loading');

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      }, 1500);
    }

    /**
     * Handle forgot password
     */
    function handleForgotPassword(e) {
      e.preventDefault();
      showToast('⏳ إعادة تعيين كلمة المرور قريباً');
    }

    /**
     * Handle sign up
     */
    function handleSignUp(e) {
      e.preventDefault();
      showToast('📝 صفحة التسجيل قريباً');
    }

    /**
     * Handle Google login
     */
    function handleGoogleLogin() {
      showToast('🔵 تسجيل دخول Google قريباً');
    }

    /**
     * Handle GitHub login
     */
    function handleGithubLogin() {
      showToast('⬛ تسجيل دخول GitHub قريباً');
    }

    /**
     * Initialize on page load
     */
    document.addEventListener('DOMContentLoaded', function() {
      // Check if user already logged in
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser) {
        window.location.href = 'dashboard.html';
        return;
      }

      // Auto-fill email if remembered
      const rememberEmail = localStorage.getItem('rememberEmail');
      if (rememberEmail) {
        document.getElementById('email').value = rememberEmail;
        document.getElementById('rememberMe').checked = true;
      }

      // Handle Enter key
      document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
      });
    });

    /**
     * Demo users
     */
    console.log('🧪 Demo Users:');
    console.log('Email: omar@skillnexus.com | Password: password123');
    console.log('Email: sara@skillnexus.com | Password: password123');
  </script>
</body>
</html>
